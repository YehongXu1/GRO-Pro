# Small regression-test config.
# Keep this file on tiny data so `make test` stays fast even when
# config/config.yaml points to a real experiment dataset.

graph_path: ../tests/small_network.txt
coordinates_path:
queries_path: ../tests/small_queries.txt

alpha: 0.15
beta: 4.0
max_time: 3600

max_iterations: 5
baseline_random_seed: 0
lambda: 0.45
gamma: 0.5
impact_weight: 0.15
theta_percentile: 0.90
min_slot_width: 600
svp_k: 3
svp_theta: 0.80
